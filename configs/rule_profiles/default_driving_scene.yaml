name: default_driving_scene
description: Default rule profile for split and merge diversion scene filtering.
taxonomy:
  diversion_types:
    - split
    - merge
    - non_diversion
    - uncertain
required_fields:
  - is_diversion_scene
  - diversion_type
  - key_objects
  - visual_evidence
  - confidence
  - explanation
confidence_thresholds:
  low_confidence: 0.5
  keep_diversion: 0.75
  discard_non_diversion: 0.7
risk_rules:
  - id: confidence_below_default_threshold
    severity: high
    description: Confidence is below the default threshold and should be reviewed.
  - id: explanation_missing
    severity: high
    description: Explanation is missing or empty.
  - id: diversion_flag_type_conflict
    severity: high
    description: Diversion flag conflicts with the predicted diversion type.
  - id: diversion_type_uncertain
    severity: medium
    description: Model cannot determine whether the sample is split, merge, or non-diversion.
  - id: diversion_key_objects_missing
    severity: high
    description: Split or merge diversion scenes require supporting key objects.
  - id: diversion_visual_evidence_missing
    severity: high
    description: Split or merge diversion scenes require positive visual evidence.
